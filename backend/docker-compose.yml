services:
  postgres:
    container_name: nakama-postgres
    image: postgres:12.2-alpine
    environment:
      POSTGRES_DB: nakama
      POSTGRES_PASSWORD: localdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 3s
      timeout: 3s
      retries: 5

  nakama:
    container_name: nakama
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    develop:
      watch:
        - action: rebuild
          path: ./Dockerfile
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json
        - action: sync+restart
          path: ./build/index.js
          target: /nakama/data/modules/build/index.js
        - action: sync+restart
          path: ./local.yml
          target: /nakama/data/local.yml
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --config /nakama/data/local.yml --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
        --config /nakama/data/local.yml
        --database.address postgres:localdb@postgres:5432/nakama
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
